<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Number Analytics App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#ef4444;
padding:14px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:#1e293b;
border-radius:12px;
padding:15px;
margin-bottom:15px;
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.stats{
display:flex;
justify-content:space-between;
}

.stat{
text-align:center;
font-size:18px;
}

#timer{
text-align:center;
font-size:22px;
}

#result{
text-align:center;
font-size:60px;
margin:10px;
}

.trend{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:4px;
}

.cell{
padding:8px;
border-radius:4px;
font-size:12px;
text-align:center;
}

.big{background:#f59e0b;}
.small{background:#3b82f6;}

.heat-big{background:#fb923c;}
.heat-small{background:#60a5fa;}

canvas{
background:#0f172a;
}

input{
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
}

.navbar{
position:fixed;
bottom:0;
width:100%;
background:#1e293b;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.nav-btn{
color:white;
font-size:14px;
}

.hidden{display:none}

</style>

</head>

<body>

<header>Number Analytics</header>

<div id="loginPage" class="container">

<div class="card">

<h3>Login</h3>

<input id="username" placeholder="Username">

<br><br>

<button onclick="login()">Enter</button>

</div>

</div>

<div id="app" class="hidden">

<div id="dashboard" class="container">

<div class="card">

<div>Welcome <span id="userDisplay"></span></div>

<div id="timer">Next round in: 30</div>

<div id="result">-</div>

</div>

<div class="card stats">

<div class="stat">
Big<br><span id="bigCount">0</span>
</div>

<div class="stat">
Small<br><span id="smallCount">0</span>
</div>

<div class="stat">
Prediction<br><span id="prediction">-</span>
</div>

</div>

<div class="card">

<canvas id="chart"></canvas>

</div>

</div>

<div id="trendPage" class="container hidden">

<div class="card">

<h3>Trend Heatmap</h3>

<div id="trend" class="trend"></div>

</div>

</div>

<div id="statsPage" class="container hidden">

<div class="card">

<h3>Statistics</h3>

Average number: <span id="avg"></span><br>
Total rounds: <span id="totalRounds"></span>

</div>

</div>

<div class="navbar">

<div class="nav-btn" onclick="showPage('dashboard')">Dashboard</div>
<div class="nav-btn" onclick="showPage('trendPage')">Trend</div>
<div class="nav-btn" onclick="showPage('statsPage')">Stats</div>

</div>

</div>

<script>

let round=1
let countdown=30
let history=JSON.parse(localStorage.getItem("history")||"[]")

let bigCount=0
let smallCount=0

history.forEach(h=>{
 if(h.size==="Big") bigCount++
 else smallCount++
})

const ctx=document.getElementById("chart")

const chart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Numbers',
data:[],
borderColor:'#22c55e',
tension:0.3
}]
}
})

function login(){

let user=document.getElementById("username").value
if(!user) return alert("Enter username")

localStorage.setItem("demoUser",user)
startApp()

}

function startApp(){

document.getElementById("loginPage").style.display="none"
document.getElementById("app").classList.remove("hidden")

document.getElementById("userDisplay").innerText=localStorage.getItem("demoUser")

renderTrend()
updateStats()

}

function showPage(page){

document.getElementById("dashboard").classList.add("hidden")
document.getElementById("trendPage").classList.add("hidden")
document.getElementById("statsPage").classList.add("hidden")

document.getElementById(page).classList.remove("hidden")

}

function getSize(n){

return n>=5?"Big":"Small"

}

function generate(){

let num=Math.floor(Math.random()*10)

let size=getSize(num)

document.getElementById("result").innerText=num

history.unshift({round,num,size})

if(size==="Big") bigCount++
else smallCount++

if(history.length>300) history.pop()

localStorage.setItem("history",JSON.stringify(history))

chart.data.labels.push(round)
chart.data.datasets[0].data.push(num)
chart.update()

renderTrend()
updateStats()

round++

}

function renderTrend(){

let board=document.getElementById("trend")
board.innerHTML=""

history.slice(0,100).forEach(h=>{

let cell=document.createElement("div")

cell.className="cell "+(h.size==="Big"?"heat-big":"heat-small")

cell.innerText=h.num

board.appendChild(cell)

})

}

function updateStats(){

document.getElementById("bigCount").innerText=bigCount
document.getElementById("smallCount").innerText=smallCount

let prediction= bigCount>smallCount ? "Small likely" : "Big likely"

document.getElementById("prediction").innerText=prediction

let sum=history.reduce((a,b)=>a+b.num,0)

document.getElementById("avg").innerText=(history.length?sum/history.length:0).toFixed(2)

document.getElementById("totalRounds").innerText=history.length

}

setInterval(function(){

countdown--

document.getElementById("timer").innerText="Next round in: "+countdown

if(countdown===0){

generate()
countdown=30

}

},1000)

if(localStorage.getItem("demoUser")) startApp()

</script>

</body>
</html>
