<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NumberLab Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

</head>

<body class="bg-gray-900 text-white">

<div class="bg-red-500 p-4 text-center text-xl font-bold">
NumberLab Analytics
</div>

<div class="p-4 grid grid-cols-1 md:grid-cols-3 gap-4">

<div class="bg-gray-800 p-4 rounded-xl">
<div class="text-gray-400">Current Number</div>
<div id="result" class="text-5xl text-center mt-4">-</div>
<div id="timer" class="text-center text-sm mt-2">Next round: 30</div>
</div>

<div class="bg-gray-800 p-4 rounded-xl">
<div class="text-gray-400">Big Count</div>
<div id="bigCount" class="text-3xl">0</div>
</div>

<div class="bg-gray-800 p-4 rounded-xl">
<div class="text-gray-400">Small Count</div>
<div id="smallCount" class="text-3xl">0</div>
</div>

</div>

<div class="p-4">

<div class="bg-gray-800 p-4 rounded-xl">

<canvas id="chart"></canvas>

</div>

</div>

<div class="p-4">

<div class="bg-gray-800 p-4 rounded-xl">

<h2 class="text-lg mb-3">Trend Board</h2>

<div id="trend" class="grid grid-cols-10 gap-2"></div>

</div>

</div>

<script>

let history=[]
let countdown=30
let bigCount=0
let smallCount=0

const ctx=document.getElementById("chart")

const chart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Numbers',
data:[],
borderColor:'#22c55e',
tension:0.4
}]
}
})

function getSize(n){

return n>=5?"Big":"Small"

}

function generate(){

let num=Math.floor(Math.random()*10)

document.getElementById("result").innerText=num

let size=getSize(num)

history.unshift({num,size})

if(size==="Big") bigCount++
else smallCount++

if(history.length>300) history.pop()

document.getElementById("bigCount").innerText=bigCount
document.getElementById("smallCount").innerText=smallCount

chart.data.labels.push(history.length)
chart.data.datasets[0].data.push(num)
chart.update()

renderTrend()

}

function renderTrend(){

let board=document.getElementById("trend")

board.innerHTML=""

history.slice(0,100).forEach(h=>{

let cell=document.createElement("div")

cell.className="p-2 text-center rounded "+(h.size==="Big"?"bg-yellow-500":"bg-blue-500")

cell.innerText=h.num

board.appendChild(cell)

})

}

setInterval(()=>{

countdown--

document.getElementById("timer").innerText="Next round: "+countdown

if(countdown===0){

generate()

countdown=30

}

},1000)

</script>

</body>
</html>
